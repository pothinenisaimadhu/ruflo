worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    keepalive_timeout 65;
    gzip off;  # required for sub_filter to work

    server {
        listen 3000;
        server_name _;

        # Use Docker's internal DNS resolver so upstream hostnames are resolved
        # lazily at request time — nginx won't crash if rufloui isn't running
        resolver 127.0.0.11 valid=10s ipv6=off;

        # --- CORS headers on all responses ---
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        # Preflight
        if ($request_method = OPTIONS) {
            return 204;
        }

        # --- RuFlo brand assets (logo, favicons, manifest) ---
        location /chatui/ {
            alias /etc/nginx/static/;
            expires 1h;
            add_header Cache-Control "public";
            add_header Access-Control-Allow-Origin "*" always;
        }

        # --- RuFlo static JS/CSS ---
        location /ruflo/ {
            alias /etc/nginx/static/;
            expires 1h;
            add_header Cache-Control "public";
            add_header Access-Control-Allow-Origin "*" always;
        }

        # --- RuFlo Dashboard ---
        location = /dashboard {
            return 301 /dashboard.html;
        }
        location = /dashboard.html {
            alias /etc/nginx/static/dashboard.html;
            add_header Cache-Control "no-cache";
        }

        # --- MCP Bridge API proxy (for dashboard) ---
        location /mcp-bridge/ {
            proxy_pass http://mcp-bridge:3001/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # --- Workspace file API (proxied from mcp-bridge) ---
        location /workspace/ {
            proxy_pass http://mcp-bridge:3001/workspace/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;
        }

        # --- RuFloUI dashboard (React + WebSocket backend) ---
        # Variable-based proxy_pass so nginx resolves lazily (won't crash if rufloui is down)
        location /rufloui/ {
            set $rufloui_upstream http://rufloui:28580;
            proxy_pass $rufloui_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";
        }

        # --- RuFloUI WebSocket ---
        location /rufloui/ws {
            set $rufloui_ws http://rufloui:28580;
            proxy_pass $rufloui_ws/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
        }

        # --- Proxy to Chat UI with script injection + URL rewriting ---
        location / {
            proxy_pass http://chat-ui:3000;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";

            # Disable gzip from upstream so sub_filter works
            proxy_set_header Accept-Encoding "";

            # Rewrite absolute PUBLIC_ORIGIN URLs to relative paths
            # (fixes CORS when accessed via codespace port-forward)
            sub_filter 'http://localhost:3000' '';
            sub_filter '</head>' '<script src="/ruflo/welcome.js" defer></script></head>';
            sub_filter_once off;
            sub_filter_types text/html application/json;
        }
    }
}
