# RuFlo Chat UI (ruvocal fork) + MCP Bridge
# All secrets via environment variables. Never commit .env files with keys.
#
# Usage:
#   cp .env.example .env   # fill in your API keys
#   docker compose up -d

services:
  # --- MongoDB ---
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: ${MONGODB_DB_NAME:-chat-db}

  # --- MCP Bridge (ruvocal version — Gemini grounded search, autopilot SSE) ---
  mcp-bridge:
    build:
      context: ./src/ruvocal/mcp-bridge
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ${WORKSPACE_DIR:-./workspace}:/workspace
    environment:
      PORT: "3001"
      NODE_ENV: production
      # AI Provider Keys (required: at least one)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      # Backend service URLs (add your own)
      SEARCH_API_URL: ${SEARCH_API_URL:-}
      RESEARCH_API_URL: ${RESEARCH_API_URL:-}
      # --- Tool Groups (MCP_GROUP_*) ---
      # Default-on groups
      MCP_GROUP_INTELLIGENCE: ${MCP_GROUP_INTELLIGENCE:-true}
      MCP_GROUP_AGENTS: ${MCP_GROUP_AGENTS:-true}
      MCP_GROUP_MEMORY: ${MCP_GROUP_MEMORY:-true}
      MCP_GROUP_DEVTOOLS: ${MCP_GROUP_DEVTOOLS:-true}
      # Opt-in groups
      MCP_GROUP_SECURITY: ${MCP_GROUP_SECURITY:-true}
      MCP_GROUP_BROWSER: ${MCP_GROUP_BROWSER:-true}
      MCP_GROUP_NEURAL: ${MCP_GROUP_NEURAL:-true}
      MCP_GROUP_AGENTIC_FLOW: ${MCP_GROUP_AGENTIC_FLOW:-true}
      MCP_GROUP_CLAUDE_CODE: ${MCP_GROUP_CLAUDE_CODE:-false}
      MCP_GROUP_GEMINI: ${MCP_GROUP_GEMINI:-false}
      MCP_GROUP_CODEX: ${MCP_GROUP_CODEX:-false}
      # API keys for optional groups
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Ollama
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_DEFAULT_MODEL: ${OLLAMA_DEFAULT_MODEL:-llama3.2}
      MCP_GROUP_OLLAMA: ${MCP_GROUP_OLLAMA:-true}
      # Force Ollama as the only LLM provider for mcp-bridge chat completions
      LLM_PROVIDER: ollama
      WORKSPACE_PATH: /workspace
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r => process.exit(r.ok ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Nginx reverse proxy (brand injection, CORS, static assets) ---
  nginx:
    build:
      context: ./src/nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      chat-ui:
        condition: service_healthy
      mcp-bridge:
        condition: service_healthy
      rufloui:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- RuFlo Chat UI (ruvocal SvelteKit fork — built from source) ---
  chat-ui:
    build:
      context: ./src/ruvocal
      dockerfile: Dockerfile
      args:
        INCLUDE_DB: "false"
    restart: unless-stopped
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      # Runtime config injected via DOTENV_LOCAL (entrypoint.sh writes .env.local)
      DOTENV_LOCAL: |
        MONGODB_URL=mongodb://mongodb:27017
        MONGODB_DB_NAME=${MONGODB_DB_NAME:-chat-db}
        PUBLIC_APP_NAME=${BRAND_NAME:-RuFlo}
        PUBLIC_APP_DESCRIPTION=${BRAND_DESCRIPTION:-Enterprise AI Agent Orchestration Platform}
        PUBLIC_APP_ASSETS=chatui
        PUBLIC_ORIGIN=http://localhost:3000
        LLM_SUMMARIZATION=true
        ENABLE_DATA_EXPORT=true
        ALLOW_IFRAME=true
        OPENAI_BASE_URL=http://mcp-bridge:3001
        OPENAI_API_KEY=${OPENAI_API_KEY:-sk-placeholder}
        MODELS=`[{"name":"openai/gpt-oss-120b:free","displayName":"GPT OSS 120B (Free)","description":"OpenAI GPT OSS 120B via OpenRouter - free","id":"openai/gpt-oss-120b:free","parameters":{"temperature":0.7}},{"name":"openai/gpt-oss-20b:free","displayName":"GPT OSS 20B (Free)","description":"OpenAI GPT OSS 20B via OpenRouter - free, fast","id":"openai/gpt-oss-20b:free","parameters":{"temperature":0.7}},{"name":"nvidia/nemotron-3-super-120b-a12b:free","displayName":"Nemotron Super 120B (Free)","description":"NVIDIA Nemotron Super 120B via OpenRouter - free","id":"nvidia/nemotron-3-super-120b-a12b:free","parameters":{"temperature":0.7}},{"name":"nvidia/nemotron-3-nano-30b-a3b:free","displayName":"Nemotron Nano 30B (Free)","description":"NVIDIA Nemotron Nano 30B via OpenRouter - free","id":"nvidia/nemotron-3-nano-30b-a3b:free","parameters":{"temperature":0.7}},{"name":"meta-llama/llama-3.3-70b-instruct:free","displayName":"Llama 3.3 70B (Free)","description":"Meta Llama 3.3 70B via OpenRouter - free","id":"meta-llama/llama-3.3-70b-instruct:free","parameters":{"temperature":0.7}},{"name":"qwen/qwen3-coder:free","displayName":"Qwen3 Coder (Free)","description":"Qwen3 Coder via OpenRouter - free","id":"qwen/qwen3-coder:free","parameters":{"temperature":0.7}},{"name":"google/gemma-4-31b-it:free","displayName":"Gemma 4 31B (Free)","description":"Google Gemma 4 31B via OpenRouter - free","id":"google/gemma-4-31b-it:free","parameters":{"temperature":0.7}},{"name":"minimax/minimax-m2.5:free","displayName":"MiniMax M2.5 (Free)","description":"MiniMax M2.5 via OpenRouter - free","id":"minimax/minimax-m2.5:free","parameters":{"temperature":0.7}},{"name":"z-ai/glm-4.5-air:free","displayName":"GLM 4.5 Air (Free)","description":"Z-AI GLM 4.5 Air via OpenRouter - free","id":"z-ai/glm-4.5-air:free","parameters":{"temperature":0.7}},{"name":"gemini-2.5-flash","displayName":"Gemini 2.5 Flash","description":"Google Gemini 2.5 Flash - free tier","id":"gemini-2.5-flash","parameters":{"temperature":0.7}},{"name":"llama3.2","displayName":"Llama 3.2 (Local)","description":"Meta Llama 3.2 3B running locally via Ollama","id":"llama3.2","parameters":{"temperature":0.7}}]`
        DEFAULT_MODEL=llama3.2
        MCP_SERVERS=[{"name":"Core Tools","url":"http://mcp-bridge:3001/mcp/core"},{"name":"Intelligence & Learning","url":"http://mcp-bridge:3001/mcp/intelligence"},{"name":"Agents & Orchestration","url":"http://mcp-bridge:3001/mcp/agents"},{"name":"Memory & Knowledge","url":"http://mcp-bridge:3001/mcp/memory"},{"name":"Dev Tools & Analysis","url":"http://mcp-bridge:3001/mcp/devtools"}]
        COOKIE_SECURE=${COOKIE_SECURE:-false}
        COOKIE_SAMESITE=${COOKIE_SAMESITE:-lax}
    depends_on:
      - mongodb
      - mcp-bridge

  # --- RuFloUI — React dashboard for swarm/agent/task management ---
  rufloui:
    build:
      context: ./src/rufloui
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "28580"
    environment:
      PORT: "28580"
      NODE_ENV: production
      RUFLOUI_SKIP_PERMISSIONS: "true"
      RUFLOUI_CORS_ORIGIN: "http://localhost:3000"
      TELEGRAM_ENABLED: "false"
      GITHUB_WEBHOOK_ENABLED: "false"
      RUFLO_PERSIST_DIR: /app/.ruflo
      # LLM provider — Ollama only (no external API keys required)
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_MODEL: ${LLM_MODEL:-llama3.2}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_DEFAULT_MODEL: ${OLLAMA_DEFAULT_MODEL:-llama3.2}
    volumes:
      - rufloui_data:/app/.ruflo
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:28580/api/system/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      ollama:
        condition: service_healthy
      mcp-bridge:
        condition: service_started

  # --- Ollama (local LLM) ---
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU support is optional — remove the deploy block if you don't have NVIDIA GPU
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  mongo-data:
  ollama_data:
  rufloui_data:
